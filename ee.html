    <title>NVIV/EE</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-size: 1em;
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        font-family: sans-serif;
      }
      .pantalla {
        width: 100%;
        height: 100%;
        max-height: 100vh;
        max-width: calc(100vh * 9 / 16);
        aspect-ratio: 9 / 16;
        position: relative;
        overflow: hidden;
      }
      .inicio {
        background-image: url('https://lh3.googleusercontent.com/d/19tZOoCzUQJGHzZ-UL4JbCtzrBZYcIP8W=s3000');
        background-size: cover;
        background-position: center;
        display: flex;
        justify-content: center;
        align-items: flex-end;
        padding: 2em;
        box-sizing: border-box;
      }
      button {
        width: 50%;
        font-size: 1em;
        padding: 0.8em 2em;
        border: none;
        border-radius: 2em;
        background: #000;
        color: #FFF;
        cursor: pointer;
      }
      button:active {
        transform: scale(0.95);
      }
      .segunda {
        display: none;
        position: relative;
        background-image: url('https://lh3.googleusercontent.com/d/19bNmfCTPtlVyxAAesrrdEEPkx1sMDIpp=s2000');
        background-size: cover;
        background-position: center;
      }
      #ytplayer {
        position: absolute;
        width: 0;
        height: 0;
        opacity: 0;
        pointer-events: none;
      }
      .imagen-contenedor {
        position: absolute;
        inset: 0;
        z-index: 1;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .imagen-contenedor img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }
      .pila {
        display: none;
      }
    </style>
  </head>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
      let player;
      let intervalo;
      let imagenes = [];
      let contenedor = document.getElementById("imagenContenedor");
      function onYouTubeIframeAPIReady() {
        player = new YT.Player('ytplayer', {
          playerVars: {
            listType: 'playlist',
            list: 'PLTsg_kaNc_ZbIrQvOPmRepLoqmW7ZSnf0',
            autoplay: 0,
            controls: 0,
            modestbranding: 1,
            rel: 0
          }
        });
      }
      document.getElementById("activar").addEventListener("click", function() {
        if (document.documentElement.requestFullscreen) {
          document.documentElement.requestFullscreen();
        }
        document.getElementById("inicio").style.display = "none";
        document.getElementById("segunda").style.display = "block";
        imagenes = Array.from(document.querySelectorAll("#pila img"));
        if (player && player.playVideo) {
          player.playVideo();
        }
      });
      function efectoAleatorio() {
        if (intervalo) return;
        intervalo = setInterval(() => {
          let random = Math.floor(Math.random() * imagenes.length);
          contenedor.innerHTML = "";
          contenedor.appendChild(imagenes[random].cloneNode());
        }, 60);
        setTimeout(() => {
          clearInterval(intervalo);
          intervalo = null;
          let finalRandom = Math.floor(Math.random() * imagenes.length);
          contenedor.innerHTML = "";
          contenedor.appendChild(imagenes[finalRandom].cloneNode());
        }, 5000);
      }
      document.getElementById("segunda").addEventListener("click", efectoAleatorio);
    </script>
